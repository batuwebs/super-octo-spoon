<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* iOS Pro Tasarım Değişkenleri */
        :root { --blue: #007AFF; --bg: #000; --card: #1C1C1E; --gold: #FFD60A; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding: 20px 16px; margin: 0; }
        
        .header h1 { font-size: 34px; letter-spacing: -1px; margin: 0; }
        .status-widget { 
            background: var(--card); border-radius: 22px; padding: 18px; 
            display: flex; align-items: center; justify-content: space-between; 
            margin: 20px 0; border: 0.5px solid #38383A;
        }
        .badge-admin { background: #FF3B30; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 800; }
        .badge-vip { background: rgba(255, 214, 10, 0.2); color: var(--gold); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .app-card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            border: 0.5px solid #38383A; transition: 0.2s;
        }
        .app-card:active { transform: scale(0.9); }
        .icon { width: 40px; height: 40px; border-radius: 10px; background: #2C2C2E; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 20px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="welcome">BatuWebs</h1>
    </div>

    <div class="status-widget">
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="u_avatar" style="width:44px; height:44px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-weight:bold;">B</div>
            <div>
                <div id="u_name" style="font-weight:600;">Admin</div>
                <div id="u_limit" style="font-size:12px; color:#8E8E93;">Sınırsız Erişim</div>
            </div>
        </div>
        <div id="u_status" class="badge-vip">ELITE</div>
    </div>

    <div class="app-grid">
        <div class="app-card" onclick="run('Analiz')"><div class="icon"><i class="fas fa-bolt"></i></div><span>Hızlı Analiz</span></div>
        <div class="app-card" onclick="run('Güvenlik')"><div class="icon"><i class="fas fa-shield"></i></div><span>Güvenlik</span></div>
        <div class="app-card" onclick="run('Proxy')"><div class="icon"><i class="fas fa-server"></i></div><span>Proxy</span></div>
        <div id="admin_btn" class="app-card" style="display:none; border-color: #FF3B30;" onclick="run('Admin Panel')">
            <div class="icon" style="color:#FF3B30;"><i class="fas fa-crown"></i></div><span>Yönetim</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        const isVip = params.get('vip') === '1';
        const myId = "8795833691"; // Senin ID'n

        // --- GOD MODE KONTROLÜ ---
        const isAdmin = (userId === myId);

        if (isAdmin) {
            document.getElementById('u_name').innerText = "KURUCU";
            document.getElementById('u_status').className = "badge-admin";
            document.getElementById('u_status').innerText = "GOD MODE";
            document.getElementById('u_limit').innerText = "Limit Devre Dışı";
            document.getElementById('admin_btn').style.display = "block";
            document.getElementById('u_avatar').style.background = "#FF3B30";
        } else if (isVip) {
            document.getElementById('u_status').innerText = "ELITE VIP";
            document.getElementById('u_limit').innerText = "Sınırsız Erişim";
        }

        let clicks = parseInt(localStorage.getItem('b_clicks') || "0");
        if (!isAdmin && !isVip) document.getElementById('u_limit').innerText = `Kalan Hak: ${2 - clicks}`;

        function run(name) {
            tg.HapticFeedback.impactOccurred('heavy');
            
            // Eğer adminse veya vip ise limit sorgulama, direkt çalıştır
            if (isAdmin || isVip) {
                tg.showPopup({ title: 'Başlatıldı', message: name + ' modülü açıldı.', buttons: [{type: 'ok'}] });
                return;
            }

            if (clicks >= 2) {
                tg.showPopup({ title: 'Limit!', message: 'Hakların bitti AMK. VIP al!', buttons: [{type: 'close'}] });
                return;
            }

            clicks++;
            localStorage.setItem('b_clicks', clicks);
            location.reload();
        }
    </script>
</body>
</html>
