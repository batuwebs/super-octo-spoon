<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: #1C1C1E; --gray: #8E8E93; --red: #FF453A; --gold: #FFD60A; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px 16px env(safe-area-inset-bottom); }
        
        /* Limit Header */
        .limit-header { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 20px; text-align: center; border: 0.5px solid #333; }
        .limit-header span { color: var(--blue); font-weight: bold; }

        /* Icon Grid (Top Actions) */
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .top-card { background: var(--card); border-radius: 20px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; border: 0.5px solid #333; }
        .top-card i { font-size: 24px; color: var(--gold); }
        .top-card span { font-size: 13px; font-weight: 600; text-align: center; }

        /* Admin Panel Modal */
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .admin-section { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .admin-input { width: 100%; background: #2C2C2E; border: none; padding: 12px; border-radius: 10px; color: #fff; margin: 8px 0; }
        .admin-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; margin-top: 5px; }

        /* Main Modules */
        .module-list { display: flex; flex-direction: column; gap: 10px; }
        .module-item { background: var(--card); padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 0.5px solid #333; text-decoration: none; color: white; }
        .module-info { display: flex; align-items: center; gap: 15px; }
        .module-info i { width: 35px; height: 35px; background: #2C2C2E; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--blue); }
        .module-item:active { background: #2C2C2E; transform: scale(0.98); }

        .chevron { color: var(--gray); font-size: 14px; }
        .locked { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="limit-header">
        GÜNLÜK KULLANIM HAKKI: <span id="limit-text">3 / 3</span>
    </div>

    <div class="top-grid">
        <div id="admin-icon" class="top-card" style="display:none;" onclick="toggleAdmin(true)">
            <i class="fas fa-user-shield"></i>
            <span>YÖNETİM PANELİ</span>
        </div>
        <div class="top-card" onclick="showProfile()">
            <i class="fas fa-address-card"></i>
            <span>ÜYELİK DURUMU</span>
        </div>
    </div>

    <div class="module-list">
        <a href="belge.html" class="module-item">
            <div class="module-info">
                <i class="fas fa-file-invoice"></i>
                <span>KARNE OLUŞTURUCU</span>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <script>
            for(let i=0; i<6; i++) {
                document.write(`
                <a href="soon.html" class="module-item locked">
                    <div class="module-info">
                        <i class="fas fa-layer-group"></i>
                        <span>ÇOK YAKINDA</span>
                    </div>
                    <i class="fas fa-lock chevron"></i>
                </a>
                `);
            }
        </script>
    </div>

    <div id="admin-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Yönetim Merkezi</h2>
            <button onclick="toggleAdmin(false)" style="background:none; border:none; color:var(--blue); font-weight:bold;">Kapat</button>
        </div>
        
        <div class="admin-section">
            <h3>VIP İşlemleri</h3>
            <input type="text" id="vip_id" class="admin-input" placeholder="Kullanıcı ID">
            <button class="admin-btn" style="background:var(--gold); color:#000;" onclick="adminAction('VIP Ekle')">VIP Ekle</button>
            <button class="admin-btn" style="background:var(--red); color:#fff;" onclick="adminAction('VIP Sil')">VIP İptal</button>
        </div>

        <div class="admin-section">
            <h3>Kullanıcı Kontrol</h3>
            <input type="text" id="ban_id" class="admin-input" placeholder="Kullanıcı ID">
            <button class="admin-btn" style="background:#444; color:#fff;" onclick="adminAction('Banla')">Erişimi Yasakla</button>
        </div>

        <div class="admin-section">
            <h3>Admin Yönetimi</h3>
            <input type="text" id="new_admin_id" class="admin-input" placeholder="Yeni Admin ID">
            <button class="admin-btn" style="background:var(--blue); color:#fff;" onclick="adminAction('Admin Ekle')">Admin Yetkisi Ver</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const myId = "8795833691";
        const userId = params.get('id');
        const isVip = params.get('vip') === '1' || userId === myId;

        // Admin Kontrolü
        if (userId === myId) {
            document.getElementById('admin-icon').style.display = 'flex';
            document.getElementById('limit-text').innerText = "SINIRSIZ";
        } else if (isVip) {
            document.getElementById('limit-text').innerText = "SINIRSIZ (VIP)";
        } else {
            let clicks = localStorage.getItem('clicks_v7') || 0;
            document.getElementById('limit-text').innerText = (3 - clicks) + " / 3";
        }

        function toggleAdmin(show) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('admin-modal').style.display = show ? 'block' : 'none';
        }

        function showProfile() {
            tg.showPopup({
                title: 'Üyelik Bilgileri',
                message: `ID: ${userId}\nStatü: ${isVip ? 'VIP / Admin' : 'Standart'}\nKayıt: Aktif sistem üyesi`,
                buttons: [{type: 'ok'}]
            });
        }

        function adminAction(action) {
            tg.showConfirm(`${action} işlemini onaylıyor musunuz?`, (ok) => {
                if(ok) tg.showAlert("İşlem bot üzerinden başarıyla gerçekleştirildi.");
            });
        }
    </script>
</body>
</html>
