<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BatuWebs Elite Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #09090b;
            --card-bg: #121214;
            --border: #27272a;
            --text-gray: #a1a1aa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            overflow-x: hidden;
        }

        /* Üst Bilgi Kartı */
        .status-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .user-info h2 { margin: 0; font-size: 18px; color: var(--gold); }
        .user-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-gray); }

        .badge {
            background: rgba(241, 196, 15, 0.1);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        /* Ana Menü Izgarası */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 80px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 12px;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .menu-item:active {
            transform: scale(0.96);
            background: #1c1c1f;
            border-color: var(--gold);
        }

        .menu-item i {
            font-size: 28px;
            color: var(--gold);
            filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.3));
        }

        .menu-item span {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .menu-item .tag {
            font-size: 9px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        /* Alt Navigasyon */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(18, 18, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            z-index: 100;
        }

        .nav-link { color: var(--text-gray); font-size: 20px; transition: 0.3s; }
        .nav-link.active { color: var(--gold); }

        /* Kilitli Özellik Efekti */
        .locked { opacity: 0.6; position: relative; }
        .locked::after {
            content: "\f023";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="user-info">
            <h2 id="u_name">Hoş Geldin!</h2>
            <p id="u_days">Kullanım hakkı sorgulanıyor...</p>
        </div>
        <div id="u_badge" class="badge">SORGULANIYOR</div>
    </div>

    <div class="grid">
        <div class="menu-item" onclick="handleAction('Belge Oluşturucu')">
            <i class="fas fa-file-contract"></i>
            <span>BELGE OLUŞTUR</span>
            <div class="tag">AKTİF</div>
        </div>
        
        <div class="menu-item locked" onclick="handleAction('Hesap Analizi')">
            <i class="fas fa-chart-pie"></i>
            <span>ANALİZ ARAÇLARI</span>
            <div class="tag">VIP GEREKLİ</div>
        </div>

        <div class="menu-item locked" onclick="handleAction('Proxy Yönetimi')">
            <i class="fas fa-network-wired"></i>
            <span>PROXY LİSTESİ</span>
            <div class="tag">VIP GEREKLİ</div>
        </div>

        <div class="menu-item locked" onclick="handleAction('Tasarım Modülü')">
            <i class="fas fa-wand-magic-sparkles"></i>
            <span>TASARIM YAP</span>
            <div class="tag">ÇOK YAKINDA</div>
        </div>

        <div class="menu-item locked" onclick="handleAction('Sistem Ayarları')">
            <i class="fas fa-sliders"></i>
            <span>AYARLAR</span>
            <div class="tag">GÜNCELLEME</div>
        </div>

        <div class="menu-item" onclick="handleAction('Canlı Destek')">
            <i class="fas fa-headset"></i>
            <span>CANLI DESTEK</span>
            <div class="tag">7/24 YARDIM</div>
        </div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-house nav-link active"></i>
        <i class="fas fa-crown nav-link" onclick="handleAction('VIP Bilgi')"></i>
        <i class="fas fa-wallet nav-item nav-link" onclick="handleAction('Bakiye')"></i>
        <i class="fas fa-user-circle nav-link" onclick="handleAction('Profil')"></i>
    </div>

    <script>
        // Telegram WebApp Başlatma
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ekranı tam boy yap
        tg.ready();

        // Parametreleri Çek (Botun gönderdiği linkten)
        const urlParams = new URLSearchParams(window.location.search);
        const isVip = urlParams.get('vip') === '1';
        const days = urlParams.get('days') || '0';
        const userId = urlParams.get('id');

        // UI Güncelleme
        document.getElementById('u_badge').innerText = isVip ? 'ELITE VIP' : 'STANDART';
        document.getElementById('u_days').innerText = days + ' Günlük Kullanım Hakkı';
        if(tg.initDataUnsafe.user) {
            document.getElementById('u_name').innerText = "Selam, " + tg.initDataUnsafe.user.first_name;
        }

        // Aksiyon Yönetimi
        function handleAction(name) {
            tg.HapticFeedback.impactOccurred('medium'); // Titreşim desteği
            
            if (!isVip && name !== 'Belge Oluşturucu' && name !== 'Canlı Destek') {
                tg.showPopup({
                    title: 'Erişim Kısıtlı',
                    message: name + ' özelliğini kullanabilmek için VIP üyeliğe sahip olmalısın.',
                    buttons: [{id: 'buy', type: 'default', text: 'VIP Satın Al'}, {type: 'cancel', text: 'Kapat'}]
                }, function(buttonId) {
                    if (buttonId === 'buy') {
                        tg.close(); // Bot üzerinden ödemeye yönlendirme mantığı için
                    }
                });
            } else {
                tg.showPopup({
                    title: 'BatuWebs Elite',
                    message: name + ' modülü şu anda başlatılıyor. Lütfen bekleyin...',
                    buttons: [{type: 'ok', text: 'Tamam'}]
                });
            }
        }
    </script>
</body>
</html>
