<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BatuWebs Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS TASARIMI */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* Profil Kartı */
        .user-card {
            background: linear-gradient(145deg, #1a1a1a, #252525);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        #user-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #0088cc;
            margin-bottom: 12px;
            object-fit: cover;
            background-color: #333;
        }

        #user-name { margin: 5px 0; font-size: 20px; font-weight: bold; }
        #user-handle { margin: 0; color: #0088cc; font-size: 14px; }

        .status-badge {
            background: #0088cc;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .vip-status { background: linear-gradient(90deg, #ffd700, #b8860b); color: #000; }

        /* Bilgi Kutuları */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .info-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #222;
        }

        .label { font-size: 11px; color: #777; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .value { font-size: 15px; font-weight: bold; color: #eee; }

        .divider { border: 0; border-top: 1px solid #222; margin: 20px 0; }

        /* Butonlar */
        .button-container { display: flex; flex-direction: column; gap: 12px; }

        .action-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid #2a2a2a;
        }

        .action-button:active { transform: scale(0.97); background: #282828; }
        
        .btn-text { flex-grow: 1; margin: 0 15px; font-size: 15px; }
        .icon-box { font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* VIP Özel Stil */
        .vip-btn { border: 1px solid #ffd70033; background: #1a180a; }
        .vip-btn .btn-text { color: #ffd700; }

        .footer-note { text-align: center; color: #444; font-size: 11px; margin-top: 30px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-card">
            <img id="user-photo" src="https://via.placeholder.com/100?text=..." alt="Profil">
            <h2 id="user-name">Yükleniyor...</h2>
            <p id="user-handle">@bekleyiniz</p>
            <div id="status-chip" class="status-badge">Standart Üye</div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span class="label">Günlük Limit</span>
                <span class="value" id="user-limit">2 / 2</span>
            </div>
            <div class="info-box">
                <span class="label">VIP Süresi</span>
                <span class="value" id="vip-time">Yok</span>
            </div>
        </div>

        <hr class="divider">

        <div id="button-list" class="button-container">
            </div>

        <div class="footer-note">
            BatuWebs Altyapısı Kullanılmaktadır.<br>
            Her gün 00:00'da kullanım limitleri yenilenir.
        </div>
    </div>

    <script>
        // Telegram Web App API Başlatma
        const tg = window.Telegram.WebApp;
        tg.expand(); // Uygulamayı tam ekran açar
        tg.ready();

        // Kullanıcı Verilerini Telegram'dan Çekme
        const userData = tg.initDataUnsafe.user;

        if (userData) {
            document.getElementById('user-name').innerText = userData.first_name + (userData.last_name ? " " + userData.last_name : "");
            document.getElementById('user-handle').innerText = userData.username ? "@" + userData.username : "ID: " + userData.id;
            
            if (userData.photo_url) {
                document.getElementById('user-photo').src = userData.photo_url;
            }
        }

        // BUTON LİSTESİ (Json Mantığı)
        // Burayı istediğin gibi düzenleyebilirsin
        const myButtons = [
            { name: "Dosya Paylaşım", link: "https://t.me/batuWebsTR", iconL: "📁", iconR: "📥", type: "standart" },
            { name: "E-Ticaret Kursları", link: "https://t.me/eticaretnedir", iconL: "💰", iconR: "🚀", type: "standart" },
            { name: "VIP Özel İçerik", link: "#", iconL: "💎", iconR: "🔒", type: "vip" },
            { name: "Destek Al", link: "https://t.me/batuwebs", iconL: "🛠", iconR: "💬", type: "standart" }
        ];

        const listContainer = document.getElementById('button-list');

        myButtons.forEach(btn => {
            const btnEl = document.createElement('a');
            btnEl.href = btn.link;
            btnEl.className = btn.type === 'vip' ? 'action-button vip-btn' : 'action-button';
            
            btnEl.innerHTML = `
                <div class="icon-box">${btn.iconL}</div>
                <div class="btn-text">${btn.name}</div>
                <div class="icon-box">${btn.iconR}</div>
            `;
            
            // Linke tıklanınca Telegram içinde açılması için
            btnEl.onclick = (e) => {
                if(btn.link !== "#") {
                    tg.openLink(btn.link);
                    e.preventDefault();
                }
            };

            listContainer.appendChild(btnEl);
        });

        // Haptic Feedback (Titreşim) ekleme
        document.querySelectorAll('.action-button').forEach(button => {
            button.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('light');
            });
        });
    </script>
</body>
</html>
