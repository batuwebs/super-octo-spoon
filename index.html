<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .gold-text { color: var(--gold); font-weight: bold; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { 
            background: #252525; border: 1px solid #333; border-radius: 15px; padding: 25px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;
        }
        .btn i { font-size: 24px; color: var(--gold); }
        .btn:active { transform: scale(0.95); background: #333; }

        .admin-only { display: none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 20px; }
        
        .footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; display: flex; justify-content: center; gap: 20px; }
        .tab-btn { background: #222; border: 1px solid #444; padding: 10px 20px; border-radius: 30px; color: #888; font-size: 14px; }
        .tab-btn.active { background: var(--gold); color: black; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="user-tab" class="tab-content active">
        <div class="card">
            <h2 style="margin:0">BATUWEBS <span class="gold-text">ELITE</span></h2>
            <p id="status-text" style="font-size: 14px; color: #888;">Yükleniyor...</p>
        </div>

        <div class="grid">
            <div class="btn" onclick="checkLimit('Araç 1')">
                <i class="fas fa-bolt"></i>
                <span>Hızlı Analiz</span>
            </div>
            <div class="btn" onclick="checkLimit('Araç 2')">
                <i class="fas fa-fingerprint"></i>
                <span>Güvenlik Sorgu</span>
            </div>
        </div>
    </div>

    <div id="admin-tab" class="tab-content">
        <div class="card">
            <h2 class="gold-text">ADMİN YÖNETİMİ</h2>
            <p>Sistem Kontrol Merkezi</p>
        </div>
        <div class="grid">
            <div class="btn" onclick="alert('Kullanıcı listesi yakında...')">
                <i class="fas fa-users"></i>
                <span>Kullanıcılar</span>
            </div>
            <div class="btn" onclick="alert('Sistem logları...')">
                <i class="fas fa-terminal"></i>
                <span>Loglar</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="tab-btn active" onclick="switchTab('user-tab', this)">PANEL</div>
        <div id="admin-nav" class="tab-btn" style="display:none" onclick="switchTab('admin-tab', this)">ADMİN</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        const isVip = params.get('vip') === '1';
        const adminId = "8795833691";

        // Admin Kontrolü
        if (userId === adminId) {
            document.getElementById('admin-nav').style.display = 'block';
        }

        // VIP Durumu ve Limit
        let clicks = localStorage.getItem('clicks') || 0;
        document.getElementById('status-text').innerText = isVip ? "🌟 Sınırsız VIP Üye" : "🆓 Kalan Hak: " + (2 - clicks);

        function checkLimit(tool) {
            if (!isVip && clicks >= 2) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showPopup({ title: 'Limit Doldu', message: 'Günlük 2 hakkınız bitti. VIP alarak sınırı kaldırın!', buttons: [{type: 'ok'}] });
                return;
            }
            
            if(!isVip) {
                clicks++;
                localStorage.setItem('clicks', clicks);
            }
            
            tg.HapticFeedback.impactOccurred('medium');
            tg.showPopup({ title: 'Başarılı', message: tool + ' çalıştırıldı.', buttons: [{type: 'ok'}] });
            location.reload();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
