<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BatuWebs Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-bg: #090909; --card-bg: #1a1a1a; --accent: #0088cc; --vip-gold: #ffd700; }
        body { background: var(--main-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; padding-bottom: 90px; }
        .active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Duyuru Panosu */
        .announcement {
            background: rgba(0, 136, 204, 0.1);
            border-left: 4px solid var(--accent);
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 13px;
        }

        /* Profil Kısmı */
        .profile-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .user-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }

        /* Modern Butonlar */
        .action-list { display: grid; gap: 10px; }
        .action-btn {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            border: 1px solid #2a2a2a;
        }
        .action-btn i { width: 35px; color: var(--accent); font-size: 18px; }
        .action-btn .text { flex: 1; font-weight: 500; }

        /* Alt Menü */
        .navbar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(20, 20, 20, 0.95);
            display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid #333;
            backdrop-filter: blur(10px);
        }
        .nav-link { color: #666; text-decoration: none; font-size: 10px; text-align: center; transition: 0.3s; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="p-home" class="page active">
        <div class="announcement">
            🚀 <strong>Duyuru:</strong> VIP üyeliklerde %50 indirim başladı! Son gün 15 Mart.
        </div>
        
        <div class="profile-box">
            <img id="p-img" src="" class="user-img">
            <h3 id="p-name" style="margin:0;">...</h3>
            <p id="p-status" style="color:var(--accent); font-size: 12px; margin:5px 0;">STANDART KULLANICI</p>
        </div>

        <div class="action-list">
            <a href="#" class="action-btn" onclick="openLink('https://t.me/batuWebsTR')">
                <i class="fas fa-cloud-download-alt"></i>
                <div class="text">Dosya Arşivi</div>
                <i class="fas fa-chevron-right" style="font-size:12px; color:#444;"></i>
            </a>
            <a href="#" class="action-btn" onclick="openLink('https://t.me/eticaretnedir')">
                <i class="fas fa-shopping-bag"></i>
                <div class="text">E-Ticaret Platformu</div>
                <i class="fas fa-chevron-right" style="font-size:12px; color:#444;"></i>
            </a>
        </div>
    </div>

    <div id="p-settings" class="page">
        <h3>Ayarlar & Bilgi</h3>
        <div class="profile-box" style="text-align:left;">
            <p>💾 <strong>Önbelleği Temizle:</strong> Verileri sıfırla</p>
            <p>📜 <strong>Kullanım Şartları:</strong> BatuWebs kural ve şartları</p>
        </div>
    </div>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-link active" onclick="nav('p-home', this)">
            <i class="fas fa-home"></i>Ana Sayfa
        </a>
        <a href="javascript:void(0)" class="nav-link" onclick="nav('p-settings', this)">
            <i class="fas fa-cog"></i>Ayarlar
        </a>
    </nav>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Kullanıcı Bilgileri
        document.getElementById('p-name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('p-img').src = tg.initDataUnsafe.user.photo_url || 'https://via.placeholder.com/70';

        function nav(page, el) {
            tg.HapticFeedback.impactOccurred('medium');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            el.classList.add('active');
        }

        function openLink(url) {
            tg.openLink(url);
        }
    </script>
</body>
</html>
